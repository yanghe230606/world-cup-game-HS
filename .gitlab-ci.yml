stages:
  - sync
  - bundle

sync-to-external:
  stage: sync
  image: alpine/git:latest
  only:
    - main
  script:
    - git push --force "https://${EXTERNAL_USER}:${EXTERNAL_TOKEN}@${EXTERNAL_HOST}/${EXTERNAL_PROJECT}.git" HEAD:main

# 打包 git bundle 并上传到 S3
bundle-to-s3:
  stage: bundle
  retry: 2
  image: amazon/aws-cli:latest
  only:
    - main
  before_script:
    - yum install -y git
  script:
    - export AWS_ACCESS_KEY_ID=${REACTUS_TEMPLATE_BUNDLE_S3_ACCESS_KEY_ID}
    - export AWS_SECRET_ACCESS_KEY=${REACTUS_TEMPLATE_BUNDLE_S3_ACCESS_KEY_SECRET}
    - git bundle create vibe-game-2d-template.bundle --all
    - git bundle verify vibe-game-2d-template.bundle
    - aws s3 cp vibe-game-2d-template.bundle s3://${REACTUS_TEMPLATE_BUNDLE_BUCKET}/reactus-template-bundles/vibe-game-2d-template/vibe-game-2d-template.bundle
  variables:
    REACTUS_TEMPLATE_BUNDLE_BUCKET: bty-reactus-assets
    AWS_DEFAULT_REGION: us-east-1

# 打包 git bundle 并上传到 OSS（使用 ossutil）
bundle-to-oss:
  stage: bundle
  retry: 2
  image: amazon/aws-cli:latest
  only:
    - main
  before_script:
    - yum install -y git
    - curl -o /usr/local/bin/ossutil https://gosspublic.alicdn.com/ossutil/1.7.15/ossutil64
    - chmod +x /usr/local/bin/ossutil
  script:
    - git bundle create vibe-game-2d-template.bundle --all
    - git bundle verify vibe-game-2d-template.bundle
    - ossutil cp -f vibe-game-2d-template.bundle oss://${REACTUS_TEMPLATE_BUNDLE_BUCKET}/reactus-template-bundles/vibe-game-2d-template/vibe-game-2d-template.bundle -e https://oss-cn-hangzhou.aliyuncs.com -i ${REACTUS_TEMPLATE_BUNDLE_OSS_ACCESS_KEY_ID} -k ${REACTUS_TEMPLATE_BUNDLE_OSS_ACCESS_KEY_SECRET}
  variables:
    REACTUS_TEMPLATE_BUNDLE_BUCKET: bty-reactus-assets
